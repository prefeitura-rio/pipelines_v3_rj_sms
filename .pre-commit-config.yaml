default_install_hook_types: [pre-push]

repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: uv run task isort
        language: system
        types: [python]
        pass_filenames: false

      - id: lint-autofix
        name: lint-autofix
        entry: uv run task lint-autofix
        language: system
        types: [python]
        pass_filenames: false
