name: Register flows (prod)

on:
  # push:
  #   branches:
  #     - master
  #   paths:
  #     - pipelines/**
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Força deploy de todos os flows"
        required: false
        type: boolean
        default: false
      pipeline_filter:
        description: "Diretório sob o qual todos os flows terão deploy"
        requered: false
        type: string
        default: ""
      debug:
        description: "Habilita logs de debug"
        required: false
        type: boolean
        default: false
      batch_size:
        description: "Número de deploys paralelos"
        required: false
        type: number
        default: 3
      max_retries:
        description: "Número de retentativas em caso de erro no deploy"
        required: false
        type: number
        default: 2


jobs:
  deploy-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Deploy Prefect flows
        uses: ./.github/actions/deploy-prefect-flows
        with:
          environment: prod
          force_deploy: ${{ inputs.force_deploy == 'true' && '1' || '0' }}
          debug: ${{ inputs.debug }}
          batch_size: ${{ inputs.batch_size || '3' }}
          max_retries: ${{ inputs.max_retries || '2' }}
          pipeline_filter: ${{ inputs.pipeline_filter }}
