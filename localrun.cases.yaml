cases:

  ################################
  #  REPORTS                     #
  ################################

  # [teste] Previsão do tempo
  - case_slug: "test-weather-report"
    flow_path: "pipelines.reports.weather.flows"
    flow_name: "weather_report"
    params:
      environment: "dev"
      lat: -22.9519
      lon: -43.2105


  ################################
  #  EXTRACT/LOAD                #
  ################################

  # Extração Google Sheets (URL) -> tabela staging
  - case_slug: "datalake-extract-google-sheets"
    flow_path: "pipelines.datalake.extract_load.google_sheets.flows"
    flow_name: "sms_dump_url"
    params:
      environment: dev
      # url: https://docs.google.com/spreadsheets/d/...
      # gsheets_sheet_name: ...
      dataset_id: brutos_sheets
      # table_id: ...
      rename_flow: true

  # Extração de DBC/DBF (GCS) -> CSV (GCS)
  - case_slug: "datalake-extract-dbc"
    flow_path: "pipelines.datalake.extract_load.dbc.flows"
    flow_name: "extract_dbc"
    params:
      environment: dev
      # gcs_uri: gs://...

  # Extração de GDB (GCS) -> ZIP de CSVs (GCS) + tabelas (BigQuery)
  - case_slug: "datalake-extract-gdb"
    flow_path: "pipelines.datalake.extract_load.gdb.flows"
    flow_name: "extract_gdb"
    params:
      environment: dev
      # gcs_uri: gs://...
      # dataset: brutos_gdb_{cnes/sih/sia}
      # lines_per_chunk: 100000
      # data_referencia: ...


  ################################
  #  TRANSFORM                   #
  ################################

  # Restauração de backup GCS -> Cloud SQL
  - case_slug: "migrate-gcs-to-cloudsql"
    flow_path: "pipelines.datalake.migrate.gcs_to_cloudsql.flows"
    flow_name: "gcs_to_cloudsql"
    params:
      environment: dev
      items:
        - metadata:
            ap: "AP53"
            cnes: "2280310"
            reference_month: "2026-04-01"
            source_file_name: "53_236_vitacare_historic.zip"
          source_uri: "gs://vitacare_backups_gdrive_dev/HISTÓRICO_PEPVITA_RJ/AP53/vitacare_historic_2280310_20260405_062632.bak"
          database_name: "vitacare_historic_2280310"
      instance_name: "vitacare"

  # Modelos dbt
  - case_slug: "datalake-transform-dbt"
    flow_path: "pipelines.datalake.transform.dbt.flows"
    flow_name: "sms_execute_dbt"
    params:
      environment: dev
      command: test
      select: null
      exclude: null
      flag: null
      target: null
      rename_flow: false
      send_discord_report: false
