# Arquivo de configuração do Nginx inicial; leia o README
# Resumidamente:
# - rode o npm via docker compose
# - configure o nginx da máquina (fora do docker) com esse arquivo
# - acesse http://<IP público>:80
server {
	listen       80;
	server_name  localhost;
	# Proxy de :80 externa para :81 interna
	location / {
		proxy_pass http://localhost:81;
	}
}
