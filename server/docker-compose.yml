# Docker Compose para o servidor inteiro
# Inclui:
# - Prefect UI
#   [Ref] https://docs.prefect.io/v3/how-to-guides/self-hosted/docker-compose
# - Infisical
#   [Ref] https://infisical.com/docs/self-hosting/deployment-options/docker-compose

services:

  ##################################
  ##          PREFECT UI          ##
  ##################################
  prefect-postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prefect-network
    profiles:
      - prefect-profile

  prefect-redis:
    image: redis:7
    volumes:
      - prefect_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prefect-network
    profiles:
      - prefect-profile

  prefect-server:
    image: prefecthq/prefect:3-latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_UI_API_URL: http://localhost:4200/api
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
      PREFECT_SERVER_ANALYTICS_ENABLED: false
      DO_NOT_TRACK: 1
    command: prefect server start --no-services
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - prefect-network
    profiles:
      - prefect-profile

  prefect-services:
    image: prefecthq/prefect:3-latest
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: redis
      PREFECT_REDIS_MESSAGING_PORT: 6379
      PREFECT_REDIS_MESSAGING_DB: 0
      PREFECT_SERVER_ANALYTICS_ENABLED: false
      DO_NOT_TRACK: 1
    command: prefect server services start
    networks:
      - prefect-network
    profiles:
      - prefect-profile

  # Usamos Google Cloud Run ao invés de worker local
  # prefect-worker:
  #   ...


  ##################################
  ##          INFISICAL           ##
  ##################################

  infisical-backend:
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_started
    image: infisical/infisical:v0.158.7
    pull_policy: always
    env_file: .env
    ports:
      - 80:8080
    environment:
      - NODE_ENV=production
    networks:
      - infisical-network
    profiles:
      - infisical-profile

  infisical-redis:
    image: redis
    container_name: infisical-dev-redis
    env_file: .env
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - infisical-network
    volumes:
      - infisical_redis_data:/data
    profiles:
      - infisical-profile

  infisical-db:
    container_name: infisical-db
    image: postgres:14-alpine
    restart: always
    env_file: .env
    volumes:
      - infisical_pg_data:/var/lib/postgresql/data
    networks:
      - infisical-network
    healthcheck:
      test: "pg_isready --username=${POSTGRES_USER} && psql --username=${POSTGRES_USER} --list"
      interval: 5s
      timeout: 10s
      retries: 10
    profiles:
      - infisical-profile


networks:
  prefect-network:
  infisical-network:

volumes:
  prefect_pg_data:
  prefect_redis_data:
  infisical_pg_data:
    driver: local
  infisical_redis_data:
    driver: local
